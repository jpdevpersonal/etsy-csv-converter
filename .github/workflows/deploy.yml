name: Deploy Azure Static Web App

on:
  workflow_dispatch: {}
  workflow_run:
    workflows:
      - Test
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: azure-static-web-app-production
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    name: Deploy Production Site
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_RED_DESERT_0672C4903 }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ""
          skip_app_build: true
